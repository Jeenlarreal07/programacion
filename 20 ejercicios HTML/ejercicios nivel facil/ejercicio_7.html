Ejercicio 7: Formulario de inicio de sesión
Enunciado: Crea la estructura de un formulario de login básico.
Requerimientos:
- Utilizar <form>.
- Incluir un input tipo texto y otro tipo password.
- Añadir un botón submit (<input type="submit"> o <button>).
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Formulario de Login</title>
    </head>
    <body>
        <form action="#" method="post">
            <label for="username">Nombre de usuario:</label>
            <input type="text" id="username" name="username" required>
            <br><br>
            <label for="password">Contraseña:</label>
            <input type="password" id="password" name="password" required>
            <br><br>
            <input type="submit" value="Iniciar sesión">
        </form>
    </body>
    </html>
