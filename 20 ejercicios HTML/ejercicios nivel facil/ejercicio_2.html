<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receta de pizza</title>
</head>
<body>
    <h2>Receta de pizza</h2>
    <h3>Ingredientes:</h3>
    <ul>
        <li>Masa de pizza</li>
        <li>Salsa de tomate</li>
        <li>Mozzarella</li>
        <li>Pepperoni</li>
    </ul>
    <h3>Pasos:</h3>
    <ol>
        <li>Prender el horno a 220°C.</li>
        <li>Extender la masa de pizza.</li>
        <li>Aplicar la salsa de tomate.</li>
        <li>Agregar la mozzarella y el pepperoni.</li>
        <li>Cocinar durante 12-15 minutos.</li>
    </ol>
</body>
</html>
